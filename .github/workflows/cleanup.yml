name: Deployment Cleanup

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Cleanup on VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no deploy@${{ secrets.DEPLOY_HOST }} "
            docker stop portfolio-pr-${{ github.event.pull_request.number }} 2>/dev/null || true
            docker rm portfolio-pr-${{ github.event.pull_request.number }} 2>/dev/null || true
            docker rmi portfolio-pr-${{ github.event.pull_request.number }} 2>/dev/null || true
            rm -f /tmp/portfolio-pr-${{ github.event.pull_request.number }}.tar
          "